<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluare Profesori | Liceul Teoretic "Nicolae Iorga"</title>
    <style>
        /* DESIGN LIQUID GLASS */
        :root {
            --bg-deep: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --star-size: 2.2rem;
            --accent-gold: #FFD700;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at 50% 0%, #4a00e0, #0f172a 70%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 850px;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.8rem;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 45px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .teacher-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .name {
            font-weight: 500;
            font-size: 1.2rem;
        }

        .stars span {
            cursor: pointer;
            color: rgba(255,255,255,0.2);
            font-size: var(--star-size);
            padding: 0 4px;
            transition: all 0.3s ease;
        }

            .stars span:hover, .stars span.active {
                color: var(--accent-gold);
                text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            }

        .footer-stats {
            margin-top: 40px;
            text-align: center;
            padding: 30px;
            background: rgba(0,0,0,0.2);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Liceul Teoretic "Nicolae Iorga"</h1>
        </header>

        <section class="glass-panel">
            <div id="teacher-list"></div>
            <div class="footer-stats">
                Media Generală: <strong id="global-avg">0.0</strong>
            </div>
        </section>
    </div>

    <script>
        const profesori = [
            "Dragut Tatiana", "Iancu Ileana", "Stanciu Maria", "Pena Adina",
            "Chiose Manuela", "Sulea Violeta", "Tokai Gabriela", "Irimia Laura",
            "Necula Mara", "Comandasu Gabriela", "Grigore Mihaela", "Romanescu Adina",
            "Dicu Alexandra", "Lambuta Georgiana", "Balan Maria", "Savin Laurentiu", "Pircalabu Laura"
        ];

        // LOGICĂ RESETARE ZILNICĂ ȘI PERSISTENȚĂ
        function initApp() {
            const today = new Date().toDateString();
            const lastDate = localStorage.getItem('lastRatingDate');

            // Dacă este o zi nouă, resetăm tot
            if (lastDate !== today) {
                localStorage.clear();
                localStorage.setItem('lastRatingDate', today);
            }

            const listContainer = document.getElementById('teacher-list');
            profesori.forEach(prof => {
                const savedRating = localStorage.getItem(prof) || 0;
                const div = document.createElement('div');
                div.className = 'teacher-item';
                div.innerHTML = `
                        <span class="name">${prof}</span>
                        <div class="stars" data-name="${prof}" data-rating="${savedRating}">
                            ${[1, 2, 3, 4, 5].map(n => `<span class="${n <= savedRating ? 'active' : ''}" onclick="rate(this, ${n})">★</span>`).join('')}
                        </div>
                    `;
                listContainer.appendChild(div);
            });
            calculateGlobal();
        }

        function rate(el, val) {
            const container = el.parentElement;
            const profName = container.dataset.name;
            container.dataset.rating = val;
            localStorage.setItem(profName, val);

            const spans = container.querySelectorAll('span');
            spans.forEach((s, i) => s.className = i < val ? 'active' : '');
            calculateGlobal();
        }

        function calculateGlobal() {
            const ratings = document.querySelectorAll('.stars');
            let sum = 0, count = 0;
            ratings.forEach(r => {
                const val = parseInt(r.dataset.rating);
                if (val > 0) { sum += val; count++; }
            });
            document.getElementById('global-avg').innerText = count > 0 ? (sum / count).toFixed(1) : "0.0";
        }

        window.onload = initApp;
    </script>
</body>
</html>
